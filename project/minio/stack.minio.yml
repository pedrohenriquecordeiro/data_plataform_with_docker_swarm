version: "3.9"

services:
  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    ports:
      - target: 9000
        published: 9000
        mode: host      # change it to ingress for more than one node
      - target: 9001
        published: 9001
        mode: host      # change it to ingress for more than one node
    volumes:
      - /opt/data-platform/minio/data:/data
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      MINIO_AUDIT_WEBHOOK_ENABLE_target1: "on"
      MINIO_AUDIT_WEBHOOK_ENDPOINT_target1: "http://localhost:9000"
    command: server /data --address ":9000" --console-address ":9001"
    deploy:
      replicas: 1
      resources:
        reservations:
          cpus: "2.0"
          memory: 4g
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        order: stop-first
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - data-platform-network
    secrets:
      - minio_root_user
      - minio_root_password
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

networks:
  data-platform-network:
    external: true

secrets:
  minio_root_user:
    external: true
  minio_root_password:
    external: true
